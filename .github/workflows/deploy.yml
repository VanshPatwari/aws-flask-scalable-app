name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~
            pkill -f app.py || true
            git clone https://github.com/VanshPatwari/aws-flask-scalable-app.git app || true
            cd app
            git pull
            pip3 install -r requirements.txt
            nohup python3 app.py &